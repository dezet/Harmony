services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: ${HARMONY_DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${HARMONY_DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${HARMONY_DATABASE_NAME:-harmony_dev}
    ports:
      - "${HARMONY_DATABASE_PORT:-5432}:5432"
    volumes:
      - harmony_postgres_data:/var/lib/postgresql/data
      - ./priv/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  harmony_postgres_data:
